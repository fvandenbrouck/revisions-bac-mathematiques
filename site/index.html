function isExerciseGroupId(id){
  return EXERCISE_GROUPS.some(g=>g.id===id);
}

function exerciseGroupById(id){
  return EXERCISE_GROUPS.find(g=>g.id===id)||null;
}

function exerciseGroupByThemeId(themeId){
  return EXERCISE_GROUPS.find(g=>g.themes.includes(themeId))||null;
}

function exerciseGroupEntries(){
  return EXERCISE_GROUPS
    .map(g=>({
      ...g,
      kind:'group',
      count:DATA.exercices.filter(e=>g.themes.includes(e.thematique_id)).length
    }))
    .filter(g=>g.count>0);
}

function selectedLabelById(id){
  if(id==='all') return null;
  return exerciseGroupById(id)||themeById(id);
}

function sidebarEntries(){
  if(view==='exercises'){
    return exerciseGroupEntries();
  }
  return DATA.programme.thematiques.map(t=>({...t,kind:'theme'}));
}

function exercicesForSidebarEntry(entry){
  if(entry.kind==='group'){
    return DATA.exercices.filter(e=>entry.themes.includes(e.thematique_id));
  }
  return DATA.exercices.filter(e=>e.thematique_id===entry.id);
}

function detailedThemeIdsForCurrentSelection(){
  if(theme==='all') return DATA.programme.thematiques.map(t=>t.id);
  const g=exerciseGroupById(theme);
  return g?g.themes:[theme];
}

function domainLabel(id){return (DATA.domains||{})[id]||id||'';}
function filtered(){return DATA.exercices.filter(e=>{if(theme!=='all'){const g=exerciseGroupById(theme);if(g){if(!g.themes.includes(e.thematique_id))return false;}else if(e.thematique_id!==theme)return false;}if(domain!=='all'&&e.domaine_id!==domain)return false;if(year!=='0'&&String(e.annee)!==year)return false;if(diff!=='0'&&String(e.difficulte)!==diff)return false;if(search){const hay=[e.titre,e.resume_enonce,e.texte_extrait,e.enonce,...asArray(e.notions),...asArray(e.mots_cles)].join(' ').toLowerCase();if(!hay.includes(search))return false;}return true;});}
function renderSidebar(){const root=$('#themeList');const entries=sidebarEntries();root.innerHTML=entries.map(t=>{const exs=exercicesForSidebarEntry(t);const done=exs.filter(e=>mastered.has(e.id)).length;const pct=exs.length?Math.round(100*done/exs.length):0;return `<button class="theme-row ${theme===t.id?'active':''}" data-theme="${esc(t.id)}"><div class="theme-main"><span class="theme-ico">${esc(t.icone||'∑')}</span><span class="theme-title">${esc(t.titre)}</span></div><div class="theme-domain">${esc(t.domain||domainLabel(t.domain_id))}</div><div class="theme-progress"><span style="width:${pct}%"></span></div><div class="small">${done}/${exs.length} maîtrisés</div></button>`}).join('');root.querySelectorAll('[data-theme]').forEach(b=>b.addEventListener('click',()=>setTheme(b.dataset.theme)));$('#allThemesBtn').classList.toggle('active',theme==='all');const total=DATA.exercices.length,done=DATA.exercices.filter(e=>mastered.has(e.id)).length;$('#globalBar').style.width=(total?100*done/total:0)+'%';$('#globalText').textContent=`${done} / ${total} maîtrisés`;$('#countStatus').textContent=`${filtered().length} exercice(s)`;}

function renderAll(){renderSidebar();$$('.tab,[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===view));$('#viewExercises').classList.toggle('hide',view!=='exercises');$('#viewCourses').classList.toggle('hide',view!=='courses');$('#viewMethodology').classList.toggle('hide',view!=='methodology');$('#viewQuiz').classList.toggle('hide',view!=='quiz');const t=selectedLabelById(theme);const titles={exercises:'Exercices',courses:'Cours',methodology:'Méthode bac',quiz:'Quiz'};$('#pageTitle').textContent=titles[view]||'Exercices';$('#pageSubtitle').textContent=view==='methodology'?'Méthodes générales pour les exercices de mathématiques':(t?`${t.icone||'∑'} ${t.titre}`:'Toutes les thématiques');if(view==='exercises')renderExercises();if(view==='courses')renderCourses();if(view==='methodology')renderMethodology();if(view==='quiz')renderQuiz();}
function renderExercises(){const exs=filtered();$('#countStatus').textContent=`${exs.length} exercice(s)`;$('#exerciseGrid').innerHTML=exs.length?exs.map(card).join(''):'<div class="empty">Aucun exercice ne correspond aux filtres.</div>';$('#exerciseGrid').querySelectorAll('.card').forEach(c=>c.addEventListener('click',()=>openEx(c.dataset.id,'enonce')));$('#exerciseGrid').querySelectorAll('[data-action]').forEach(b=>b.addEventListener('click',ev=>{ev.stopPropagation();const id=b.closest('.card').dataset.id;if(b.dataset.action==='help')openEx(id,'aide');if(b.dataset.action==='solution')openEx(id,'corrige');if(b.dataset.action==='master')toggleMaster(id,false);}));}

function renderCourses(){const root=$('#courseRoot');const ids=detailedThemeIdsForCurrentSelection();const blocks=ids.map(id=>courseBlock(id)).join('');root.innerHTML=blocks||'<div class="empty">Aucun cours disponible. Lance le script 05_generate_courses.py puis 06_build_site_data.py.</div>';renderMath(root);renderMermaid(root);$('#countStatus').textContent=`${ids.length} thème(s)`;}
function courseBlock(id){const course=DATA.cours[id];const t=themeById(id);if(!course)return `<div class="section-card"><h3>${esc(t.icone||'∑')} ${esc(t.titre||id)}</h3><p class="source-note">Cours non généré pour ce thème.</p></div>`;let html=`<div class="section-card"><h3>${esc(t.icone||'∑')} ${esc(course.titre||t.titre||id)}</h3>${course.domaine_label?`<p class="source-note">${esc(course.domaine_label)}</p>`:''}${course.synthese?`<div class="textblock">${fmt(course.synthese)}</div>`:''}</div>`;html+=sectionList('Objectifs bac',course.objectifs_bac);html+=cards('Définitions',course.definitions,['terme','definition']);html+=cards('Propriétés et théorèmes',course.proprietes_theoremes||course.propriétés_théorèmes,['nom','enonce','conditions']);html+=cards('Formules',course.formules,['nom','formule','variables','conditions'],'formula');html+=cards('Méthodes type bac',course.methodes,['titre','etapes','points_vigilance']);html+=cards('Automatismes',course.automatismes,['competence','exemple']);html+=cards('Erreurs fréquentes',course.erreurs_frequentes||course.points_vigilance,['erreur','correction']);html+=sectionList('Conseils bac',course.conseils_bac);if(course.algorithmes_python)html+=cards('Algorithmique / Python',course.algorithmes_python,['titre','description','code','vigilance']);if(course.carte_mentale)html+=mindmapHtml(course.carte_mentale);else if(course.carte_mentale_mermaid)html+=`<div class="section-card"><h3>Carte mentale</h3><div class="mermaid-wrap"><div class="mermaid">${esc(course.carte_mentale_mermaid)}</div></div></div>`;return `<div>${html}</div>`;}
function sectionList(title,items){items=asArray(items).filter(Boolean);if(!items.length)return'';return `<div class="section-card"><h3>${esc(title)}</h3>${items.map(x=>`<div class="advice">${fmt(typeof x==='string'?x:JSON.stringify(x))}</div>`).join('')}</div>`;}
function cards(title,items,keys,cls=''){items=asArray(items).filter(Boolean);if(!items.length)return'';return `<div class="section-card"><h3>${esc(title)}</h3><div class="method-grid">${items.map(it=>{if(typeof it==='string')return`<div class="mini-card">${fmt(it)}</div>`;let body=keys.map(k=>{let v=it[k];if(!v)return'';if(Array.isArray(v))v=v.join('\n');return `<p class="${cls&&k==='formule'?'formula':''}"><strong>${esc(labelKey(k))}</strong>${fmt(v)}</p>`;}).join('');return `<div class="mini-card">${body}</div>`;}).join('')}</div></div>`;}
function labelKey(k){return {terme:'Terme',definition:'Définition',nom:'Nom',enonce:'Énoncé',formule:'Formule',variables:'Variables',conditions:'Conditions',titre:'Titre',etapes:'Étapes',points_vigilance:'Vigilances',description:'Description',code:'Code',vigilance:'Vigilance'}[k]||k;}
function mindmapHtml(carte){const branches=asArray(carte.branches);if(!branches.length)return'';return `<div class="section-card"><h3>${esc(carte.titre||'Carte mentale')}</h3><div class="mind-grid">${branches.map(b=>`<div class="mind-branch"><h4>${esc(b.nom||b.titre||'Branche')}</h4>${listHtml(b.items||b.elements||[])}</div>`).join('')}</div></div>`;}
function renderMermaid(root){setTimeout(()=>{try{if(window.mermaid){root.querySelectorAll('.mermaid').forEach((el,i)=>{const id='mmd-'+Date.now()+'-'+i;mermaid.render(id,el.textContent).then(({svg})=>{el.innerHTML=svg;}).catch(()=>{});});}}catch(e){}},50);}
function renderMethodology(){const root=$('#methodologyRoot');const m=DATA.methodologie||{};if(Object.keys(m).length){root.innerHTML=`${m.synthese?`<div class="section-card"><h3>Méthode générale</h3><div class="textblock">${fmt(m.synthese)}</div></div>`:''}${sectionList('Compétences mathématiques',m.competences_mathematiques||m.competences)}${sectionList('Rédaction au bac',m.redaction_bac)}${sectionList('Validation des résultats',m.validation_des_resultats)}${sectionList('Usage des figures et données',m.usage_des_figures_et_donnees)}${sectionList('Checklists',m.checklists)}`;}else{root.innerHTML=`<div class="section-card"><h3>Méthode bac en mathématiques</h3><div class="method-step"><div class="step-num">1</div><div><strong>Identifier le chapitre réel</strong><p>Ne te fie pas seulement au contexte : repère les objets mathématiques mobilisés, puis la méthode attendue.</p></div></div><div class="method-step"><div class="step-num">2</div><div><strong>Écrire les hypothèses</strong><p>Pour utiliser un théorème, vérifie les conditions : continuité, dérivabilité, indépendance, orthogonalité, etc.</p></div></div><div class="method-step"><div class="step-num">3</div><div><strong>Structurer la réponse</strong><p>Un calcul isolé ne suffit pas : annonce l’idée, calcule, conclus dans le contexte.</p></div></div><div class="method-step"><div class="step-num">4</div><div><strong>Contrôler la cohérence</strong><p>Signe, ordre de grandeur, domaine de définition, probabilité entre 0 et 1, unité éventuelle.</p></div></div></div>`;}$('#countStatus').textContent='Méthode bac';renderMath(root);}
function renderQuiz(){const ids=detailedThemeIdsForCurrentSelection();const qs=ids.flatMap(id=>asArray(DATA.quiz[id]).map(q=>({...q,theme:id})));if(!qs.length){$('#quizRoot').innerHTML='<h3>Quiz local</h3><p>Aucune question disponible pour ce filtre.</p>';return;}let i=0,score=0;function show(){const q=qs[i],t=themeById(q.theme);$('#quizRoot').innerHTML=`<h3>Quiz local — ${esc(t.icone||'∑')} ${esc(t.titre||q.theme)}</h3><p>Question ${i+1}/${qs.length} · Score ${score}/${i}</p><h2>${fmt(q.question)}</h2>${asArray(q.options).map((o,j)=>`<button class="q-option" data-choice="${j}">${fmt(o)}</button>`).join('')}<div class="q-expl" id="qExpl"></div>`;$('#quizRoot').querySelectorAll('[data-choice]').forEach(b=>b.onclick=()=>{const choice=Number(b.dataset.choice),ok=choice===Number(q.correct);if(ok)score++;$('#quizRoot').querySelectorAll('[data-choice]').forEach(x=>{x.disabled=true;const c=Number(x.dataset.choice);if(c===Number(q.correct))x.classList.add('good');else if(c===choice)x.classList.add('bad');});$('#qExpl').innerHTML=`${ok?'Correct.':'Erreur.'} ${fmt(q.explanation||'')}<br><br><button class="tab active" id="nextQ">${i+1<qs.length?'Question suivante':'Recommencer'}</button>`;$('#qExpl').classList.add('show');$('#nextQ').onclick=()=>{i++;if(i>=qs.length){i=0;score=0;}show();};});renderMath($('#quizRoot'));}show();}
function renderCorrige(ex){const c=ex.corrige;if(!c)return'<p>Corrigé non disponible.</p>';if(typeof c==='string')return fmt(c);const qs=c.questions||[];if(Array.isArray(qs)&&qs.length){return qs.map(q=>`<div class="corrige-question"><h4>Question ${esc(q.numero||'')}</h4><div>${fmt(q.reponse||q.réponse||'')}</div>${q.points_attention||q.vigilance?`<p class="source-note"><strong>Point d’attention :</strong> ${esc(q.points_attention||q.vigilance)}</p>`:''}</div>`).join('');}return `<pre>${esc(JSON.stringify(c,null,2))}</pre>`;}
function exerciseImages(ex){if(ex.page_images?.length)return ex.page_images;if(ex.source?.images?.length)return ex.source.images;if(ex.image_page)return[ex.image_page];return[];}
function exercisePages(ex){if(ex.pages?.length)return ex.pages;if(ex.source?.pages?.length)return ex.source.pages;return[];}
function exercisePdfUrl(ex){
  if(!ex) return '';

  if(ex.pdf_embed_url) return ex.pdf_embed_url;

  let path =
    ex.pdf_url ||
    ex.pdf_path ||
    ex.source_pdf ||
    ex.source?.pdf ||
    ex.source?.pdf_path ||
    '';

  path = String(path || '').trim();
  if(!path) return '';

  if(path.startsWith('http://') || path.startsWith('https://')){
    const p = ex.pdf_page || exercisePages(ex)[0];
    return path + (p ? `#page=${p}` : '');
  }

  // Normalisation pour GitHub Pages : le site est publié depuis /site
  // donc les chemins doivent être relatifs à la racine publiée : pdf/...
  path = path.replace(/^site\//, '');
  path = path.replace(/^\.\//, '');
  path = path.replace(/^\/+/, '');

  if(!path.startsWith('pdf/')){
    const filename = path.split('/').pop();
    if(filename && filename.toLowerCase().endsWith('.pdf')){
      path = 'pdf/' + filename;
    }
  }

  const page = ex.pdf_page || exercisePages(ex)[0];
  return encodeURI(path + (page ? `#page=${page}` : ''));
}
function openEx(id,pane='enonce'){modalEx=DATA.exercices.find(e=>e.id===id);if(!modalEx)return;pageIndex=0;zoom=1;$('#zoom').value='1';const t=themeById(modalEx.thematique_id);$('#modalTitle').textContent=modalEx.titre||'Exercice';$('#modalMeta').textContent=`${modalEx.annee||''} · ${modalEx.session||''} · ${modalEx.zone||''} · ${modalEx.points||''} points · difficulté ${modalEx.difficulte||'?'} · ${t.titre||''}`;$('#modalHelp').innerHTML=asArray(modalEx.aide).length?'<ul>'+asArray(modalEx.aide).map(a=>`<li>${fmt(a)}</li>`).join('')+'</ul>':'<p>Aide non disponible.</p>';$('#modalSolution').innerHTML=renderCorrige(modalEx);$('#modalNotions').innerHTML=[...asArray(modalEx.notions),...asArray(modalEx.mots_cles)].map(n=>`<span class="tag">${esc(n)}</span>`).join('')||'<p>Aucune notion renseignée.</p>';const pages=exercisePages(modalEx),imgs=exerciseImages(modalEx),pdfUrl=exercisePdfUrl(modalEx);$('#modalSource').textContent=`Source : ${modalEx.pdf_path||modalEx.pdf_url||modalEx.source?.pdf||'PDF'} · pages ${pages.join(', ')||'non renseignées'}`;$('#openPdf').href=pdfUrl||'#';$('#sourceNote').textContent=pdfUrl?`PDF · ${imgs.length} image(s) disponible(s)`: `${imgs.length} page(s) image`;$('#masterBtn').textContent=mastered.has(modalEx.id)?'✅ Maîtrisé':'○ Marquer comme maîtrisé';$('#overlay').classList.add('open');showPane(pane);renderPage();renderMath($('#pane-aide'));renderMath($('#pane-corrige'));}
function showPane(name){$$('.modal-tab').forEach(b=>b.classList.toggle('active',b.dataset.pane===name));$$('.pane').forEach(p=>p.classList.remove('active'));const p=$('#pane-'+name);p.classList.add('active');renderMath(p);}
function renderPage(){const stage=$('#imageStage');const imgs=exerciseImages(modalEx);const pages=exercisePages(modalEx);if(imgs.length){pageIndex=Math.max(0,Math.min(pageIndex,imgs.length-1));$('#pageInfo').textContent=`${pageIndex+1}/${imgs.length} · page ${pages[pageIndex]||'?'}`;$('#prevPage').disabled=pageIndex===0;$('#nextPage').disabled=pageIndex===imgs.length-1;stage.innerHTML=`<img class="page-img" src="${esc(imgs[pageIndex])}" alt="Page ${esc(pages[pageIndex]||'')} du sujet" style="width:${Math.round(830*zoom)}px">`;return;}const pdfUrl=exercisePdfUrl(modalEx);if(pdfUrl){$('#pageInfo').textContent=pages.length?`PDF · page ${pages[0]}`:'PDF';$('#prevPage').disabled=true;$('#nextPage').disabled=true;stage.innerHTML=`<iframe src="${esc(pdfUrl)}" title="Énoncé PDF" style="width:100%;height:76vh;border:0;background:#fff;border-radius:8px"></iframe>`;return;}const enonce=modalEx?.enonce||modalEx?.texte_extrait||'';stage.innerHTML=enonce?`<div class="page-error"><h3>Énoncé extrait</h3><div class="textblock">${fmt(enonce)}</div></div>`:'<div class="page-error">Aucun PDF ni aucune image de page n’est associée à cet exercice.</div>';}
function navPage(d){if(!modalEx)return;const len=exerciseImages(modalEx).length;if(!len)return;const ni=Math.max(0,Math.min(len-1,pageIndex+d));if(ni!==pageIndex){pageIndex=ni;renderPage();}}
function closeModal(){$('#overlay').classList.remove('open');modalEx=null;$('#imageStage').innerHTML='';}
function toggleMaster(id,fromModal){if(mastered.has(id))mastered.delete(id);else mastered.add(id);localStorage.setItem('bac_math_mastered',JSON.stringify([...mastered]));if(fromModal&&modalEx?.id===id)$('#masterBtn').textContent=mastered.has(id)?'✅ Maîtrisé':'○ Marquer comme maîtrisé';renderAll();}
loadData();
</script>

<script id="math-card-render-patch">
(function(){
  function weakTitle(t){
    t = String(t || '').trim().toLowerCase();
    return !t
      || t === 'commun à tous les candidats'
      || t === 'commun a tous les candidats'
      || t === 'exercice'
      || t === 'exercice au choix'
      || t === 'partie a'
      || t === 'partie b'
      || t.startsWith('commun ');
  }

  function fallbackTitle(e){
    if(!e) return 'Exercice de mathématiques';
    if(e.titre_court) return e.titre_court;
    if(e.titre_genere) return e.titre_genere;

    const notions = Array.isArray(e.notions)
      ? e.notions.filter(Boolean).slice(0, 2).join(' · ')
      : '';

    if(notions) return notions;

    const theme = e.thematique_label || e.theme_label || e.thematique_id || '';
    return theme || 'Exercice de mathématiques';
  }

  function getExercises(){
    try {
      if(typeof DATA !== 'undefined' && Array.isArray(DATA.exercices)) {
        return DATA.exercices;
      }
    } catch(e) {}
    return [];
  }

  function improveExerciseCards(){
    const grid = document.getElementById('exerciseGrid');
    if(!grid) return;

    const exercices = getExercises();

    grid.querySelectorAll('.card[data-id]').forEach(card => {
      const id = card.getAttribute('data-id');
      const ex = exercices.find(e => String(e.id) === String(id));
      const h3 = card.querySelector('h3');

      if(h3 && weakTitle(h3.textContent)) {
        h3.textContent = fallbackTitle(ex);
      }
    });

    if(typeof renderMath === 'function') {
      renderMath(grid);
    }
  }

  function installPatch(){
    try {
      if(typeof renderExercises === 'function' && !renderExercises.__mathCardPatch) {
        const originalRenderExercises = renderExercises;
        const wrapped = function(){
          const result = originalRenderExercises.apply(this, arguments);
          setTimeout(improveExerciseCards, 0);
          return result;
        };
        wrapped.__mathCardPatch = true;
        renderExercises = wrapped;
      }
    } catch(e) {
      console.warn('Patch cartes exercices : impossible d’envelopper renderExercises', e);
    }

    setTimeout(improveExerciseCards, 0);
    setTimeout(improveExerciseCards, 300);
  }

  if(document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', installPatch);
  } else {
    installPatch();
  }
})();
</script>
